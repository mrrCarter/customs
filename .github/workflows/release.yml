name: Artifact Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

# Artifact-only release controls:
# - build-and-prove emits local evidence and GitHub OIDC provenance attestation
# - staging -> production-canary -> production environments gate promotion
# - rollback-evidence records the recovery artifact whenever the release path fails
jobs:
  build-and-prove:
    runs-on: ubuntu-latest
    steps:
      # All third-party actions are pinned to immutable commit SHAs. Dependabot opens weekly update PRs.
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Enforce main-only release dispatch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Artifact release workflow may only be dispatched from refs/heads/main; got ${GITHUB_REF}."
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "24"
          cache: npm
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: CLI and install-gate integration tests
        run: npm run test:integration
      - name: Red-team tarball corpus tests
        run: npm run test:redteam
      - name: Build and smoke
        run: npm run release:smoke
      - name: Enforce artifact-only v1 release
        run: |
          set -euo pipefail
          if grep -R -E "npm[[:space:]]+publish" .github package.json scripts --exclude=release.yml; then
            echo "::error::Customs v1 releases signed evidence artifacts only; registry publication must use a separate provenance-gated workflow."
            exit 1
          fi
      - name: Confirm provenance attestation artifact
        run: test -s artifacts/provenance/customs-build-provenance.json
      - name: GitHub provenance attestation
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: artifacts/provenance/customs-build-provenance.json
      - name: Upload signed release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: customs-release-evidence
          path: |
            artifacts/poisoned-install-receipt.json
            artifacts/customs-issuer-public.jwk.json
            artifacts/demo-delegation-public.jwk.json
            artifacts/customs-receipts.jsonl
            artifacts/provenance/customs-build-provenance.json
          if-no-files-found: error

  staging-smoke:
    needs: build-and-prove
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Staging promotion gate
        run: echo "Artifact-only release: staging gate passed after signed local proof."

  production-canary-smoke:
    needs: staging-smoke
    runs-on: ubuntu-latest
    environment: production-canary
    steps:
      - name: Production canary promotion gate
        run: echo "Artifact-only release: production canary gate passed before full promotion."

  production-smoke:
    needs: production-canary-smoke
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Production promotion gate
        run: echo "Artifact-only release: no cloud deploy in v1; promotion requires prior gates."

  rollback-evidence:
    if: failure()
    needs: [build-and-prove, staging-smoke, production-canary-smoke, production-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Record rollback action
        run: node scripts/rollback-evidence.mjs --reason release-workflow-failure
      - name: Upload rollback evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: customs-rollback-evidence
          path: artifacts/rollback.json
          if-no-files-found: error
